<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="100%" height="100%" fill="#0b0b0b" rx="8"/>
  <g fill="#fff" font-family="sans-serif" font-size="14">
    <text x="20" y="30" fill="#ffd" font-size="18">DJ Board Diagram</text>

    <!-- Crossfader -->
    <rect x="300" y="220" width="200" height="12" rx="6" fill="#222" />
    <rect x="390" y="210" width="20" height="32" rx="4" fill="#4a83d8" />
    <text x="300" y="255">Crossfader (center)</text>

    <!-- Deck A filter knob -->
    <circle cx="150" cy="120" r="40" fill="#222" />
    <circle cx="150" cy="120" r="28" fill="#4a83d8" />
    <text x="115" y="190">Filter A ~25%</text>

    <!-- Deck B filter knob -->
    <circle cx="650" cy="120" r="40" fill="#222" />
    <circle cx="650" cy="120" r="28" fill="#444" />
    <text x="610" y="190">Filter B ~0%</text>

    <!-- Echo indicator -->
    <rect x="360" y="40" width="80" height="30" rx="6" fill="#333" />
    <text x="370" y="60">Echo: OFF</text>

    <!-- Gain meters -->
    <rect x="80" y="40" width="12" height="120" fill="#2b2b2b" />
    <rect x="708" y="40" width="12" height="120" fill="#2b2b2b" />
    <text x="70" y="20">Gain A</text>
    <text x="700" y="20">Gain B</text>
  </g>
</svg>
